name: Pull MLB slate

# Runs the free MLB data pull (slate, pitchers, lineups, ISO, HR/9) and commits
# the resulting slate_auto_<date>.json into the repo.
#
# - "Run workflow" button = manual trigger (use this to test).
# - schedule = optional daily auto-run. Cron is in UTC. 15:00 UTC ~= 11am ET.
#   Lineups post 1-3 hrs before first pitch, so for confirmed bats run later in
#   the day; season ISO / HR9 are available any time.

on:
  workflow_dispatch:        # manual "Run workflow" button
  schedule:
    - cron: "0 15 * * *"    # 11am ET daily (adjust or delete as you like)

permissions:
  contents: write           # lets the Action commit the output file back

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run the MLB pull
        run: python3 fetch_mlb.py

      - name: Show what was produced
        run: |
          echo "---- files ----"
          ls -1 slate_auto_*.json || true
          echo "---- summary (head) ----"
          for f in slate_auto_*.json; do echo "== $f =="; head -c 1200 "$f"; echo; done

      - name: Commit the slate file
        run: |
          git config user.name  "kasper-bot"
          git config user.email "kasper-bot@users.noreply.github.com"
          git add slate_auto_*.json
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "Auto slate pull $(date -u +%Y-%m-%d)"
            git push
          fi
