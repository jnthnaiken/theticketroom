# ====================================================================================
# Build Ticket Room -- daily MLB HR-prop board pipeline.
#
# Pipeline: grade prior night -> pull StatsAPI/weather -> verify the pull is fresh ->
# score -> assemble+inject the board -> commit. regen15.py does BOTH the assemble and
# the inject into index.html. Do not add any other inject/score step.
#
# TRIGGERS:
#   repository_dispatch (event_type "build-board")  <- your external cron hits this
#   workflow_dispatch                               <- the "Run workflow" button
#   schedule                                        <- backup; GitHub often drops these
#
# SLATE DATE = the latest committed cards_<date>.json, NOT the calendar day. This HOLDS the
# last slate you actually built (graded) until you commit a new day's cards -- so the board
# never rolls onto a fresh, ungraded slate built from yesterday's fallback data overnight.
# (A manual workflow_dispatch with an explicit date still overrides.)
# ====================================================================================

name: Build Ticket Room

on:
  repository_dispatch:
    types: [build-board]
  workflow_dispatch:
    inputs:
      date:
        description: "Slate date YYYY-MM-DD (blank = latest committed cards)"
        required: false
        default: ""
  schedule:
    - cron: "7,37 16-23,0-5 * * *"

permissions:
  contents: write

concurrency:
  group: ticket-room
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve slate date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            D="${{ github.event.inputs.date }}"
          else
            # latest committed cards_<date>.json -> HOLD the last real slate until new cards land
            D="$(ls cards_*.json 2>/dev/null | sed -E 's/.*cards_([0-9]{4}-[0-9]{2}-[0-9]{2})\.json/\1/' | sort | tail -n1)"
            [ -z "$D" ] && D="$(TZ=America/New_York date +%F)"
          fi
          echo "SLATE_DATE=$D" >> "$GITHUB_ENV"
          echo "Building slate for $D"

      - name: Grade finished nights
        run: python3 grade_night.py

      - name: Log calibration (idempotent, self-healing)
        run: python3 calibrate.py --backfill

      - name: Pull slate (StatsAPI + Open-Meteo)
        run: python3 fetch_mlb.py "$SLATE_DATE"

      - name: Verify the slate was pulled fresh
        id: verify
        run: |
          python3 - "$SLATE_DATE" <<'PY'
          import json, os, sys
          d = sys.argv[1]; f = f"slate_auto_{d}.json"
          s = json.load(open(f))
          pa = str(s.get("pulled_at", ""))
          games = s.get("games", []) or []
          hr = [((g.get(side) or {}).get("sp") or {}).get("hr9")
                for g in games for side in ("away", "home")]
          have = sum(1 for x in hr if x is not None)
          print(f"{f}: pulled_at={pa!r}  HR/9 {have}/{len(hr)}")
          fresh = not (pa.startswith("manual") or "T" not in pa or have == 0)
          import re as _re
          allfinal = bool(games) and all(_re.search(r"final|completed|over", str(g.get("status") or ""), _re.I) for g in games)
          if allfinal:
              print("::notice::Slate %s is fully final -- board frozen, skipping rebuild." % d)
              fresh = False
          elif not fresh:
              print("::notice::No fresh StatsAPI pull yet (manual/stale or zero HR/9). Skipping "
                    "score+assemble+commit this run -- harmless; a later run builds it.")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"fresh={'true' if fresh else 'false'}\n")
          PY

      - name: Score the field
        if: success() && steps.verify.outputs.fresh == 'true'
        run: python3 build15.py

      - name: Assemble + inject the board
        if: success() && steps.verify.outputs.fresh == 'true'
        run: python3 regen15.py

      - name: Commit the board + ledger + calibration
        run: |
          git config user.name  "kasper-bot"
          git config user.email "kasper-bot@users.noreply.github.com"
          git add slate_auto_*.json D_*.json season.json index.html calibration.jsonl
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "Auto board build ${SLATE_DATE} ($(date -u +%H:%MZ))"
            ok=0
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && { echo "pushed"; ok=1; break; }
              echo "push attempt $i failed, retrying"; sleep 4
            done
            [ "$ok" = 1 ] || { echo "::error::push failed after 3 attempts -- board NOT updated"; exit 1; }
          fi
