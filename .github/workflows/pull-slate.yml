# ====================================================================================
# Build Ticket Room -- daily MLB HR-prop board pipeline.
#
# Pipeline: grade prior night -> pull StatsAPI/weather -> verify the pull is fresh ->
# score -> assemble+inject the board -> commit. regen15.py does BOTH the assemble and
# the inject into index.html. Do not add any other inject/score step.
#
# TRIGGERS:
#   repository_dispatch (event_type "build-board")  <- your external cron hits this
#   workflow_dispatch                               <- the "Run workflow" button
#   schedule                                        <- backup; GitHub often drops these
#
# EXTERNAL CRON (the reliable trigger), every 30 min:
#   POST https://api.github.com/repos/jnthnaiken/theticketroom/dispatches
#   Headers: Authorization: Bearer <GH_PAT>
#            Accept: application/vnd.github+json
#            Content-Type: application/json
#   Body:    {"event_type":"build-board"}
#
# SECRET: add a fine-grained PAT (Contents: read and write) as repo secret GH_PAT.
#   Committing with a PAT (not the bot token) keeps the schedule from auto-disabling.
# ====================================================================================

name: Build Ticket Room

on:
  repository_dispatch:
    types: [build-board]
  workflow_dispatch:
    inputs:
      date:
        description: "Slate date YYYY-MM-DD (blank = today, US/Eastern)"
        required: false
        default: ""
  schedule:
    - cron: "7,37 16-23,0-5 * * *"

permissions:
  contents: write

concurrency:
  group: ticket-room
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve slate date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            D="${{ github.event.inputs.date }}"
          else
            D="$(TZ=America/New_York date +%F)"
          fi
          echo "SLATE_DATE=$D" >> "$GITHUB_ENV"
          echo "Building slate for $D"

      - name: Grade finished nights
        run: python3 grade_night.py

      - name: Pull slate (StatsAPI + Open-Meteo)
        run: python3 fetch_mlb.py "$SLATE_DATE"

      - name: Verify the slate was pulled fresh
        run: |
          python3 - "$SLATE_DATE" <<'PY'
          import json, sys
          d = sys.argv[1]; f = f"slate_auto_{d}.json"
          s = json.load(open(f))
          pa = str(s.get("pulled_at", ""))
          games = s.get("games", []) or []
          hr = [((g.get(side) or {}).get("sp") or {}).get("hr9")
                for g in games for side in ("away", "home")]
          have = sum(1 for x in hr if x is not None)
          print(f"{f}: pulled_at={pa!r}  HR/9 {have}/{len(hr)}")
          if pa.startswith("manual") or "T" not in pa or have == 0:
              print("::error::slate_auto is not a fresh StatsAPI pull (manual/stale or zero "
                    "HR/9). Refusing to build a stale board. A red run here just means no HR/9 "
                    "is available yet (e.g. before starters post / after games end) -- harmless.")
              sys.exit(1)
          PY

      - name: Score the field
        run: python3 build15.py

      - name: Assemble + inject the board
        run: python3 regen15.py

      - name: Commit the board
        run: |
          git config user.name  "kasper-bot"
          git config user.email "kasper-bot@users.noreply.github.com"
          git add slate_auto_*.json D_*.json season.json index.html
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "Auto board build ${SLATE_DATE} ($(date -u +%H:%MZ))"
            ok=0
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && { echo "pushed"; ok=1; break; }
              echo "push attempt $i failed, retrying"; sleep 4
            done
            [ "$ok" = 1 ] || { echo "::error::push failed after 3 attempts -- board NOT updated"; exit 1; }
          fi
