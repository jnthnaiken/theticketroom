name: Pull MLB slate

# Runs the free MLB data pull (slate, pitchers, lineups, ISO, HR/9) and commits
# slate_auto_<date>.json into the repo.
#   "Run workflow" = manual trigger (use this to test).
#   schedule = optional daily auto-run (UTC). Lineups post 1-3 hrs before first
#   pitch, so for confirmed bats run later in the day; ISO/HR9 work any time.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"    # 5pm ET daily (~lineups up for early games); adjust/delete

permissions:
  contents: write

concurrency:
  group: pull-slate          # never let two runs race the push
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run the MLB pull
        run: python3 fetch_mlb.py

      - name: Show what was produced
        run: |
          echo "---- files ----"
          ls -1 slate_auto_*.json || true
          echo "---- summary (head) ----"
          for f in slate_auto_*.json; do echo "== $f =="; head -c 1400 "$f"; echo; done

      - name: Commit the slate file
        run: |
          git config user.name  "kasper-bot"
          git config user.email "kasper-bot@users.noreply.github.com"
          git add slate_auto_*.json
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "Auto slate pull $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && { echo "pushed"; break; }
              echo "push attempt $i failed, retrying"; sleep 4
            done
          fi
