name: Build Ticket Room

# Full daily pipeline: pull free inputs (StatsAPI + Open-Meteo) -> score -> assemble
# tickets -> inject into the shell -> commit the regenerated board. Because HR/9,
# lineups and weather are re-pulled each run, the published board updates through
# the day. The day's hand inputs (Kasper card metrics, multi-book odds, ISO sheet)
# live in the scorer's data block and are committed by hand before/at first pitch.
#
#   "Run workflow" = manual trigger (optionally pass a date to backfill/test).
#   schedule       = every 30 min across the game window (UTC). Trim to taste.

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Slate date YYYY-MM-DD (blank = today, US/Eastern)"
        required: false
        default: ""
  schedule:
    # ~12:00 PM ET through ~1:00 AM ET. GitHub may delay scheduled runs a few min.
    - cron: "*/30 16-23,0-5 * * *"

permissions:
  contents: write

concurrency:
  group: ticket-room          # never let two runs race the push
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve slate date (shared by every step)
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            D="${{ github.event.inputs.date }}"
          else
            D="$(TZ=America/New_York date +%F)"
          fi
          echo "SLATE_DATE=$D" >> "$GITHUB_ENV"
          echo "Building slate for $D"

      # 1) free auto-pull: games, SP (+hand) & HR/9, lineups, ISO (StatsAPI) + weather->wf (Open-Meteo)
      - name: Pull slate (StatsAPI + Open-Meteo)
        run: python3 fetch_mlb.py "$SLATE_DATE"

      # 2) score the field (reads slate_auto_<date>.json for wf + HR/9; hand data block already committed)
      - name: Score the field
        run: python3 build15.py

      # 3) gate the pool + assemble all tickets back into D
      - name: Assemble tickets
        run: python3 regen15.py

      # 4) render D into the shell -> outputs/ticket_room.html
      - name: Inject / render the board
        run: python3 inject15.py

      # 5) publish to the site root: index.html is what Pages serves at theticketroom.live
      - name: Publish to site root (index.html)
        run: |
          cp -f outputs/ticket_room.html index.html
          echo "promoted outputs/ticket_room.html -> index.html"

      - name: Show what was produced
        run: |
          echo "---- files ----"
          ls -1 slate_auto_*.json D_*.json outputs/ticket_room.html index.html 2>/dev/null || true
          echo "---- slate summary (head) ----"
          for f in slate_auto_${SLATE_DATE}.json; do echo "== $f =="; head -c 1200 "$f"; echo; done

      # 6) commit the refreshed inputs + regenerated board, incl. the published index.html
      - name: Commit the board
        run: |
          git config user.name  "kasper-bot"
          git config user.email "kasper-bot@users.noreply.github.com"
          git add slate_auto_*.json D_*.json outputs/ticket_room.html index.html
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "Auto board build ${SLATE_DATE} ($(date -u +%H:%MZ))"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && { echo "pushed"; break; }
              echo "push attempt $i failed, retrying"; sleep 4
            done
          fi
