name: Deploy Pages

# Publishes the self-contained board to GitHub Pages.
# Replaces the automatic "deploy from branch" flow, which cancels its own
# in-progress deploy on every push -- so with the ~6-min scratch re-drafts the
# site could never finish deploying and served a stale day. Here:
#   * concurrency guard (cancel-in-progress: false) lets the running deploy
#     FINISH and queues only the latest -- no more cancelled/stacked deploys.
#   * we publish ONLY index.html + CNAME (the board is one self-contained file),
#     so each deploy is a few seconds instead of minutes and they stop colliding.

on:
  push:
    branches: [main]
    paths: ['index.html', 'CNAME']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage only the site files (board + custom domain)
        run: |
          mkdir -p _site
          cp index.html _site/
          [ -f CNAME ] && cp CNAME _site/ || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
